{% extends "core/base.html" %}

{% block title %}スキルを削除 | スキルフリマ{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger shadow-sm">
      <div class="card-header bg-danger text-white fw-bold">削除の確認</div>
      <div class="card-body p-4">
        <p class="mb-1">以下のスキルを削除しますか？この操作は元に戻せません。</p>
        <div class="alert alert-warning mt-3">
          <strong>{{ skill.title }}</strong><br>
          <small class="text-muted">カテゴリ：{{ skill.category }} / ¥{{ skill.price|floatformat:0 }}</small>
        </div>
        <div class="d-flex gap-2 mt-3">
          <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">削除する</button>
          </form>
          <a href="{% url 'skill_detail' skill.pk %}" class="btn btn-outline-secondary">キャンセル</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
