{% extends "core/base.html" %}

{% block title %}ログイン | スキルフリマ{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="card-title mb-4">ログイン</h2>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="id_username" class="form-label fw-semibold">ユーザー名</label>
            <input
              type="text"
              id="id_username"
              name="username"
              class="form-control"
              autofocus
              required
            >
          </div>
          <div class="mb-3">
            <label for="id_password" class="form-label fw-semibold">パスワード</label>
            <input
              type="password"
              id="id_password"
              name="password"
              class="form-control"
              required
            >
          </div>
          <button type="submit" class="btn btn-primary w-100">ログイン</button>
        </form>
        <hr>
        <p class="text-center mb-0">
          アカウントをお持ちでないですか？
          <a href="{% url 'register' %}">新規登録</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
